<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tizimga kirish</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #333; }
        .error { color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 0.85em; }
        input { width: 93%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0069d9; }
        .footer-text { text-align: center; margin-top: 15px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Kirish</h2>

        {% if form.errors %}
            <div class="error">Login yoki parol xato!</div>
        {% endif %}

        <form method="post" action="{% url 'login_page' %}?next={% url 'home_page' %}">
            {% csrf_token %}
            <div class="form-group">
                <label>username</label>
                <input class="au-input au=input--full" type="username" name="username" placeholder="username">
            </div>

            <div class="form-group">
                <label>password</label>
                <input class="au-input au=input--full" type="password" name="password" placeholder="password">
            </div>

            <button type="submit">Sign in</button>
        </form>

        <div class="footer-text">
            Yangi foydalanuvchimisiz? <a href="{% url 'signup' %}">Ro'yxatdan o'ting</a>
        </div>
    </div>
</body>
</html>
